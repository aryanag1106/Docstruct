name: CI

on:
  push:
  pull_request:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Tesseract OCR)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr

      - name: Install package + dev tools
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src/ tests/ scripts/

      - name: Black --check
        run: black --check src/ tests/ scripts/

      - name: Mypy
        run: mypy src/docstruct

      - name: Bandit
        run: bandit -r src/

      - name: Generate sample data + run tests
        run: |
          python scripts/generate_sample_data.py
          pytest tests/ -v
