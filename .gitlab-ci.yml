stages:
  - lint
  - format
  - type_check
  - security
  - test
  - coverage
  - build
  - docs

default:
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq tesseract-ocr > /dev/null
    - python -m pip install --upgrade pip -q
    - pip install -e ".[dev]" -q

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

# ── lint ──────────────────────────────────────────────────────────────────────
ruff:
  stage: lint
  script:
    - ruff check src/ tests/ scripts/

commit-message-lint:
  stage: lint
  script:
    - python scripts/check_commit_message.py "$CI_COMMIT_MESSAGE"

# ── format ────────────────────────────────────────────────────────────────────
black-format-check:
  stage: format
  script:
    - black --check src/ tests/ scripts/

# ── type_check ────────────────────────────────────────────────────────────────
mypy:
  stage: type_check
  script:
    - mypy src/docstruct

# ── security ──────────────────────────────────────────────────────────────────
bandit:
  stage: security
  script:
    - bandit -r src/

pip-audit:
  stage: security
  script:
    - pip-audit

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  before_script: []
  script:
    - gitleaks detect --source . --no-banner --redact

# ── test ──────────────────────────────────────────────────────────────────────
pytest:
  stage: test
  script:
    - python scripts/generate_sample_data.py
    - pytest tests/ -v

# ── coverage ──────────────────────────────────────────────────────────────────
coverage:
  stage: coverage
  script:
    - python scripts/generate_sample_data.py
    - pytest tests/ --cov=src/docstruct --cov-report=term-missing --cov-fail-under=40

# ── build ─────────────────────────────────────────────────────────────────────
build-check:
  stage: build
  script:
    - python -c "import docstruct; print('docstruct', docstruct.__version__, 'imports cleanly')"

cli-smoke-test:
  stage: build
  script:
    - python scripts/generate_sample_data.py
    - docstruct sample_data/receipt.png --doc-type receipt | python -m json.tool

# ── docs ──────────────────────────────────────────────────────────────────────
markdownlint:
  stage: docs
  image: node:20-slim
  before_script:
    - npm install -g markdownlint-cli -s
  script:
    - markdownlint README.md CONTRIBUTING.md CHANGELOG.md --disable MD013 MD060

changelog-check:
  stage: docs
  image: python:3.11-slim
  before_script: []
  script:
    - pip install git-cliff -q
    - git-cliff --config cliff.toml --output /tmp/CHANGELOG_generated.md
    - echo "Changelog generation succeeded"
    - head -20 /tmp/CHANGELOG_generated.md
